server:
  port: 8082

spring:
  application:
    name: ms-mascotas
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:5432/mascotas_db
    username: ${DB_USER:postgres}
    password: ${DB_PASS:}
  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
  cloud:
    aws:
      region:
        static: us-east-1
      credentials:
        use-default-aws-credentials-chain: true

minio:
  endpoint: ${MINIO_ENDPOINT:https://s3.amazonaws.com}
  access-key: ${MINIO_ACCESS_KEY:}
  secret-key: ${MINIO_SECRET_KEY:}
  bucket: ${MINIO_BUCKET:sanos-y-salvos-mascotas-fotos}

jwt:
  secret: ${JWT_SECRET:}

sqs:
  queue:
    reportes-nuevos: ${SQS_REPORTES_NUEVOS_URL:https://sqs.us-east-1.amazonaws.com/000000000000/reportes-nuevos}

springdoc:
  api-docs:
    path: /v3/api-docs

logging:
  level:
    com.sanosysalvos: DEBUG

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: always
