server:
  port: 8084

spring:
  application:
    name: ms-coincidencias
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:5432/coincidencias_db
    username: ${DB_USER:postgres}
    password: ${DB_PASS:}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
    show-sql: false
  cloud:
    aws:
      region:
        static: us-east-1
      credentials:
        use-default-aws-credentials-chain: true

sqs:
  queue:
    geo-completados: ${SQS_GEO_COMPLETADOS_URL:https://sqs.us-east-1.amazonaws.com/000000000000/geo-completados}
    notificaciones: ${SQS_NOTIFICACIONES_URL:}

jwt:
  secret: ${JWT_SECRET:}

matching:
  score:
    raza-weight: 30
    tamano-weight: 20
    geo-weight: 12
    color-weight: 10
    imagen-weight: 12
  threshold: 80
  radius-km: 50

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html

logging:
  level:
    com.sanosysalvos: DEBUG

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: always
