services:
  # ============================================
  # INFRASTRUCTURE
  # ============================================

  postgres:
    image: postgis/postgis:15-3.4-alpine
    container_name: sanos-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/init-db.sql:/docker-entrypoint-initdb.d/init-db.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - sanos-network

  redis:
    image: redis:7-alpine
    container_name: sanos-redis
    command: redis-server --requirepass ${REDIS_PASS}
    ports:
      - "6380:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASS}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - sanos-network

  rabbitmq:
    image: rabbitmq:3.12-management-alpine
    container_name: sanos-rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_DEFAULT_USER}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_DEFAULT_PASS}
    ports:
      - "5672:5672"
      - "15672:15672"
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
      - ./scripts/rabbitmq.conf:/etc/rabbitmq/rabbitmq.conf
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "check_port_connectivity"]
      interval: 15s
      timeout: 10s
      retries: 5
    networks:
      - sanos-network

  rabbitmq-init:
    image: curlimages/curl:latest
    container_name: sanos-rabbitmq-init
    depends_on:
      rabbitmq:
        condition: service_healthy
    volumes:
      - ./scripts/rabbitmq-definitions.json:/tmp/definitions.json
    entrypoint: >
      /bin/sh -c "curl -s -u $${RABBITMQ_USER}:$${RABBITMQ_PASS} -X POST http://rabbitmq:15672/api/definitions -H 'Content-Type: application/json' -d @/tmp/definitions.json && echo ' RabbitMQ definitions loaded'"
    environment:
      RABBITMQ_USER: ${RABBITMQ_USER}
      RABBITMQ_PASS: ${RABBITMQ_PASS}
    networks:
      - sanos-network

  minio:
    image: minio/minio:latest
    container_name: sanos-minio
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 15s
      timeout: 10s
      retries: 5
    networks:
      - sanos-network

  minio-init:
    image: minio/mc:latest
    container_name: sanos-minio-init
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
        mc alias set local http://minio:9000 ${MINIO_ROOT_USER} ${MINIO_ROOT_PASSWORD};
        mc mb --ignore-existing local/mascotas-fotos;
        mc anonymous set download local/mascotas-fotos;
        exit 0;
      "
    networks:
      - sanos-network

  mailhog:
    image: mailhog/mailhog:latest
    container_name: sanos-mailhog
    ports:
      - "2025:1025"
      - "8025:8025"
    networks:
      - sanos-network

  # ============================================
  # MICROSERVICES
  # ============================================

  auth-service:
    build:
      context: .
      dockerfile: auth-service/Dockerfile
    container_name: sanos-auth-service
    environment:
      DB_HOST: postgres
      DB_USER: ${DB_USER}
      DB_PASS: ${DB_PASS}
      REDIS_HOST: redis
      REDIS_PASS: ${REDIS_PASS}
      JWT_SECRET: ${JWT_SECRET}
      MAIL_HOST: mailhog
      MAIL_PORT: 1025
      AUTO_VERIFY_EMAIL: "true"
    ports:
      - "8081:8081"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8081/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    networks:
      - sanos-network

  ms-mascotas:
    build:
      context: .
      dockerfile: ms-mascotas/Dockerfile
    container_name: sanos-ms-mascotas
    environment:
      DB_HOST: postgres
      DB_USER: ${DB_USER}
      DB_PASS: ${DB_PASS}
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_USER: ${RABBITMQ_USER}
      RABBITMQ_PASS: ${RABBITMQ_PASS}
      MINIO_ENDPOINT: http://minio:9000
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY}
      JWT_SECRET: ${JWT_SECRET}
    ports:
      - "8082:8082"
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      minio:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8082/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    networks:
      - sanos-network

  ms-geolocalizacion:
    build:
      context: .
      dockerfile: ms-geolocalizacion/Dockerfile
    container_name: sanos-ms-geolocalizacion
    environment:
      DB_HOST: postgres
      DB_USER: ${DB_USER}
      DB_PASS: ${DB_PASS}
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_USER: ${RABBITMQ_USER}
      RABBITMQ_PASS: ${RABBITMQ_PASS}
      JWT_SECRET: ${JWT_SECRET}
      GOOGLE_MAPS_API_KEY: ${GOOGLE_MAPS_API_KEY}
    ports:
      - "8083:8083"
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8083/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    networks:
      - sanos-network

  ms-coincidencias:
    build:
      context: .
      dockerfile: ms-coincidencias/Dockerfile
    container_name: sanos-ms-coincidencias
    environment:
      DB_HOST: postgres
      DB_USER: ${DB_USER}
      DB_PASS: ${DB_PASS}
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_USER: ${RABBITMQ_USER}
      RABBITMQ_PASS: ${RABBITMQ_PASS}
      JWT_SECRET: ${JWT_SECRET}
    ports:
      - "8084:8084"
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8084/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    networks:
      - sanos-network

  bff-service:
    build:
      context: .
      dockerfile: bff-service/Dockerfile
    container_name: sanos-bff-service
    environment:
      REDIS_HOST: redis
      REDIS_PASS: ${REDIS_PASS}
      JWT_SECRET: ${JWT_SECRET}
      AUTH_HOST: auth-service
      MASCOTAS_HOST: ms-mascotas
      GEO_HOST: ms-geolocalizacion
      COINCIDENCIAS_HOST: ms-coincidencias
    ports:
      - "9090:8080"
    depends_on:
      redis:
        condition: service_healthy
      auth-service:
        condition: service_healthy
      ms-mascotas:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8080/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    networks:
      - sanos-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: sanos-frontend
    ports:
      - "3000:3000"
    depends_on:
      - bff-service
    networks:
      - sanos-network

# ============================================
# VOLUMES & NETWORKS
# ============================================

volumes:
  postgres_data:
  redis_data:
  rabbitmq_data:
  minio_data:

networks:
  sanos-network:
    driver: bridge
