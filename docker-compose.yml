services:
  # ============================================
  # INFRASTRUCTURE
  # ============================================

  postgres:
    image: postgis/postgis:15-3.4-alpine
    container_name: sanos-postgres
    environment:
      POSTGRES_USER: ${DB_USER:postgres}
      POSTGRES_PASSWORD: ${DB_PASS:Genesis.2021}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/init-db.sql:/docker-entrypoint-initdb.d/init-db.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - sanos-network

  redis:
    image: redis:7-alpine
    container_name: sanos-redis
    command: redis-server --requirepass ${REDIS_PASS:Genesis.2021}
    ports:
      - "6380:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASS:Genesis.2021}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - sanos-network

  minio:
    image: minio/minio:latest
    container_name: sanos-minio
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY:minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY:minioadmin}
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 15s
      timeout: 10s
      retries: 5
    networks:
      - sanos-network

  minio-init:
    image: minio/mc:latest
    container_name: sanos-minio-init
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
        mc alias set local http://minio:9000 ${MINIO_ROOT_USER:minioadmin} ${MINIO_ROOT_PASSWORD:minioadmin};
        mc mb --ignore-existing local/mascotas-fotos;
        mc anonymous set download local/mascotas-fotos;
        exit 0;
      "
    networks:
      - sanos-network

  mailhog:
    image: mailhog/mailhog:latest
    container_name: sanos-mailhog
    ports:
      - "2025:1025"
      - "8025:8025"
    networks:
      - sanos-network

  # ============================================
  # MICROSERVICES
  # ============================================

  auth-service:
    build:
      context: .
      dockerfile: auth-service/Dockerfile
    container_name: sanos-auth-service
    environment:
      DB_HOST: postgres
      DB_USER: ${DB_USER:postgres}
      DB_PASS: ${DB_PASS:Genesis.2021}
      REDIS_HOST: redis
      REDIS_PASS: ${REDIS_PASS:Genesis.2021}
      JWT_SECRET: ${JWT_SECRET}
      MAIL_HOST: mailhog
      MAIL_PORT: 1025
      AUTO_VERIFY_EMAIL: "true"
    ports:
      - "8081:8081"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8081/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    networks:
      - sanos-network

  ms-mascotas:
    build:
      context: .
      dockerfile: ms-mascotas/Dockerfile
    container_name: sanos-ms-mascotas
    environment:
      DB_HOST: postgres
      DB_USER: ${DB_USER:postgres}
      DB_PASS: ${DB_PASS:Genesis.2021}
      MINIO_ENDPOINT: http://minio:9000
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY:minioadmin}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY:minioadmin}
      JWT_SECRET: ${JWT_SECRET}
    ports:
      - "8082:8082"
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8082/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    networks:
      - sanos-network

  ms-geolocalizacion:
    build:
      context: .
      dockerfile: ms-geolocalizacion/Dockerfile
    container_name: sanos-ms-geolocalizacion
    environment:
      DB_HOST: postgres
      DB_USER: ${DB_USER:postgres}
      DB_PASS: ${DB_PASS:Genesis.2021}
      JWT_SECRET: ${JWT_SECRET}
      GOOGLE_MAPS_API_KEY: ${GOOGLE_MAPS_API_KEY:}
    ports:
      - "8083:8083"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8083/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    networks:
      - sanos-network

  ms-coincidencias:
    build:
      context: .
      dockerfile: ms-coincidencias/Dockerfile
    container_name: sanos-ms-coincidencias
    environment:
      DB_HOST: postgres
      DB_USER: ${DB_USER:postgres}
      DB_PASS: ${DB_PASS:Genesis.2021}
      JWT_SECRET: ${JWT_SECRET}
    ports:
      - "8084:8084"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8084/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    networks:
      - sanos-network

  bff-service:
    build:
      context: .
      dockerfile: bff-service/Dockerfile
    container_name: sanos-bff-service
    environment:
      REDIS_HOST: redis
      REDIS_PASS: ${REDIS_PASS:Genesis.2021}
      JWT_SECRET: ${JWT_SECRET}
      AUTH_HOST: auth-service
      MASCOTAS_HOST: ms-mascotas
      GEO_HOST: ms-geolocalizacion
      COINCIDENCIAS_HOST: ms-coincidencias
    ports:
      - "9090:8080"
    depends_on:
      redis:
        condition: service_healthy
      auth-service:
        condition: service_healthy
      ms-mascotas:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8081/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    networks:
      - sanos-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: sanos-frontend
    ports:
      - "3000:3000"
    depends_on:
      - bff-service
    networks:
      - sanos-network

# ============================================
# VOLUMES & NETWORKS
# ============================================

volumes:
  postgres_data:
  redis_data:
  minio_data:

networks:
  sanos-network:
    driver: bridge
